<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>深度研报 — AI企业调研助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;height:100vh;overflow:hidden}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:10px 16px;display:flex;align-items:center;gap:12px;height:48px}
.header h1{font-size:16px;font-weight:600;background:linear-gradient(135deg,#58a6ff,#3fb950);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header span{font-size:11px;color:#8b949e}

.app-layout{display:flex;height:calc(100vh - 48px)}
.sidebar{width:270px;min-width:270px;background:#161b22;border-right:1px solid #30363d;display:flex;flex-direction:column}
.sidebar-head{padding:10px 14px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center;background:#161b22}
.sidebar-head h3{font-size:12px;color:#e1e4e8}
.sidebar-head button{background:none;border:none;color:#8b949e;cursor:pointer;padding:2px 6px;border-radius:4px;font-size:13px}
.sidebar-head button:hover{background:#21262d}
.sidebar-list{flex:1;overflow-y:auto;padding:4px}
.sidebar-item{padding:8px 10px;border-radius:6px;cursor:pointer;margin-bottom:1px}
.sidebar-item:hover{background:#21262d}
.sidebar-item.active{background:#1a3a5c;border:1px solid #1f6feb44}
.sidebar-item .si-topic{font-size:12px;color:#e1e4e8;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.sidebar-item .si-meta{font-size:10px;color:#484f58;display:flex;gap:8px;margin-top:2px}
.sidebar-item .si-meta b{color:#8b949e}
.sidebar-empty{flex:1;display:flex;align-items:center;justify-content:center;color:#484f58;font-size:12px;text-align:center;padding:20px}

.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tab-bar{display:flex;background:#0d1117;border-bottom:1px solid #30363d;padding:0 8px;overflow-x:auto;min-height:36px}
.tab-bar button{padding:8px 16px;background:none;border:none;color:#8b949e;font-size:12px;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px}
.tab-bar button:hover{color:#e1e4e8;background:#161b22}
.tab-bar button.active{color:#58a6ff;border-bottom-color:#58a6ff}
.tab-bar button .tab-close{margin-left:4px;color:#484f58;font-size:14px;line-height:1}
.tab-bar button .tab-close:hover{color:#f85149}
.tab-add{padding:8px 12px!important;font-size:16px!important}

.tab-content{flex:1;overflow-y:auto;padding:16px 20px;display:none}
.tab-content.active{display:block}

.input-area{display:flex;gap:8px;margin-bottom:16px}
.input-area input{flex:1;padding:10px 14px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e1e4e8;font-size:14px;outline:none}
.input-area input:focus{border-color:#58a6ff}
.input-area button{padding:10px 20px;background:#238636;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer}
.input-area button:hover{background:#2ea043}
.input-area button:disabled{background:#21262d;color:#484f58;cursor:not-allowed}
.input-area select{padding:10px 6px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#e1e4e8;font-size:13px}

.status-bar{display:flex;gap:18px;margin-bottom:12px;flex-wrap:wrap;font-size:12px;color:#8b949e}
.status-bar b{color:#e1e4e8}
.status-dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#484f58;margin-right:4px}
.status-dot.running{background:#d29922;animation:pulse 1s infinite}
.status-dot.done{background:#3fb950}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.progress-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:14px;max-height:240px;overflow-y:auto}
.progress-panel h3{font-size:12px;color:#8b949e;margin-bottom:8px}
.progress-item{font-size:12px;padding:3px 0;border-bottom:1px solid #21262d;display:flex;align-items:flex-start;gap:8px}
.progress-item:last-child{border-bottom:none}
.progress-node{font-weight:600;color:#58a6ff;min-width:80px;white-space:nowrap}
.progress-status{color:#8b949e;white-space:nowrap}
.progress-status.success{color:#3fb950}
.progress-status.error{color:#f85149}
.progress-detail{color:#484f58;font-size:11px;margin-top:2px;flex:1}

.report-panel{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;line-height:1.7}
.report-panel h1{font-size:20px;color:#58a6ff;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #30363d}
.report-panel h2{font-size:16px;color:#e1e4e8;margin:16px 0 8px}
.report-panel h3{font-size:14px;color:#8b949e;margin:12px 0 6px}
.report-panel p,li{margin:6px 0;font-size:13px}
.report-panel ul,ol{padding-left:20px}
.report-panel code{background:#21262d;padding:1px 5px;border-radius:3px;font-size:12px}
.report-panel a{color:#58a6ff}
.report-panel blockquote{border-left:3px solid #58a6ff;padding-left:10px;color:#8b949e;margin:10px 0}

.empty-state{text-align:center;padding:40px 20px;color:#484f58}
.example-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;justify-content:center}
.example-btn{padding:5px 12px;background:#21262d;border:1px solid #30363d;border-radius:16px;color:#8b949e;font-size:11px;cursor:pointer}
.example-btn:hover{background:#30363d;color:#e1e4e8}

/* 登录弹窗 */
.modal-overlay{position:fixed;inset:0;background:#00000088;z-index:200;display:flex;align-items:center;justify-content:center}
.modal-overlay.hidden{display:none}
.modal-box{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:24px;width:340px}
.modal-box h3{font-size:16px;color:#e1e4e8;margin-bottom:16px}
.modal-box input{width:100%;padding:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:13px;margin-bottom:10px;outline:none}
.modal-box input:focus{border-color:#58a6ff}
.modal-box button{width:100%;padding:10px;background:#238636;border:none;border-radius:6px;color:#fff;font-size:14px;cursor:pointer;margin-bottom:6px}
.modal-box button:hover{background:#2ea043}
.modal-box button.alt{background:#21262d}
.modal-box button.alt:hover{background:#30363d}
.modal-box .modal-err{color:#f85149;font-size:12px;margin-bottom:8px;min-height:16px}
</style>
</head>
<body>

<!-- 登录弹窗 -->
<div class="modal-overlay" id="loginModal">
  <div class="modal-box">
    <h3>👤 登录 / 注册</h3>
    <input id="loginUser" placeholder="用户名" />
    <input id="loginPw" type="password" placeholder="密码" />
    <div class="modal-err" id="loginErr"></div>
    <button onclick="doLogin()">🔑 登录</button>
    <button onclick="doRegister()">📝 注册</button>
    <button class="alt" onclick="doGuest()">👻 游客模式</button>
    <button class="alt" onclick="hideLogin()">✕ 取消</button>
  </div>
</div>

<!-- 顶部栏 -->
<div class="header">
  <h1>深度研报</h1>
  <span>AI 企业调研助手</span>
  <span style="margin-left:auto;font-size:11px;color:#484f58" id="userBadge">未登录</span>
  <button onclick="showLogin()" style="padding:4px 12px;background:#21262d;border:1px solid #30363d;border-radius:6px;color:#e1e4e8;font-size:11px;cursor:pointer">👤 登录</button>
  <span style="font-size:11px" id="connStatus">⚫</span>
</div>

<!-- 布局 -->
<div class="app-layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-head"><h3>📋 历史对话</h3><button onclick="loadHistory()" title="刷新">🔄</button></div>
    <div class="sidebar-list" id="sidebarList"><div class="sidebar-empty">加载中…</div></div>
  </div>

  <div class="main-area">
    <div class="tab-bar" id="tabBar">
      <button class="active" data-tab="0">🏠 主页</button>
      <button class="tab-add" onclick="newTab()" title="新建对话">+</button>
    </div>
    <div id="tabContents"></div>
  </div>
</div>

<script>
const API = 'http://localhost:8001';
let USER_ID = localStorage.getItem('deepresearch_uid') || '';
let USER_TOKEN = localStorage.getItem('deepresearch_token') || '';

// 标签页管理
let tabs = [{id:0, topic:'', running:false, progressHTML:'', reportHTML:'', timerStart:0, timer:null, iteration:'-', evidence:'-', quality:'-'}];
let activeTab = 0;
let nextTabId = 1;

function saveState() {
  localStorage.setItem('deepresearch_uid', USER_ID);
  localStorage.setItem('deepresearch_token', USER_TOKEN);
}

function $(id) { return document.getElementById(id); }

// ═══ 登录 ═══
function showLogin() { $('loginModal').classList.remove('hidden'); $('loginErr').textContent=''; }
function hideLogin() { $('loginModal').classList.add('hidden'); }

async function doLogin() {
  const u = $('loginUser').value.trim(), p = $('loginPw').value.trim();
  if(!u||!p) return $('loginErr').textContent='请填写用户名和密码';
  try {
    const r = await fetch(`${API}/api/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||'登录失败'); }
    const d = await r.json();
    USER_ID = d.user_id; USER_TOKEN = d.token; saveState();
    $('userBadge').textContent = '👤 '+d.display_name;
    hideLogin(); loadHistory();
  } catch(e) { $('loginErr').textContent = e.message; }
}

async function doRegister() {
  const u = $('loginUser').value.trim(), p = $('loginPw').value.trim();
  if(!u||!p) return $('loginErr').textContent='请填写用户名和密码';
  if(p.length<4) return $('loginErr').textContent='密码至少4位';
  try {
    const r = await fetch(`${API}/api/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if(!r.ok){ const e=await r.json(); throw new Error(e.detail||'注册失败'); }
    const d = await r.json();
    USER_ID = d.user_id; USER_TOKEN = d.token; saveState();
    $('userBadge').textContent = '👤 '+d.username;
    hideLogin(); loadHistory();
  } catch(e) { $('loginErr').textContent = e.message; }
}

async function doGuest() {
  try {
    const r = await fetch(`${API}/api/guest`,{method:'POST'});
    const d = await r.json();
    USER_ID = d.user_id; USER_TOKEN = d.token; saveState();
    $('userBadge').textContent = '👤 '+d.display_name;
    hideLogin(); loadHistory();
  } catch(e) { $('loginErr').textContent = '游客模式暂不可用'; }
}

// 自动登录
(async function(){
  if(USER_ID && USER_TOKEN) {
    try {
      const r = await fetch(`${API}/api/user`,{headers:{'X-User-ID':USER_ID}});
      if(r.ok){ const d = await r.json(); $('userBadge').textContent='👤 '+d.display_name; loadHistory(); return; }
    } catch(e){}
  }
  // 默认游客
  if(!USER_ID) { USER_ID='guest_'+Date.now(); USER_TOKEN=USER_ID; saveState(); }
  $('userBadge').textContent = '👤 游客';
  loadHistory();
})();

// ═══ 标签页 ═══
function renderTabs() {
  $('tabBar').innerHTML = tabs.map((t,i) =>
    `<button class="${i===activeTab?'active':''}" data-tab="${i}" onclick="switchTab(${i})">
      ${t.topic ? escHtml(t.topic.slice(0,15))+(t.topic.length>15?'…':'') : (i===0?'🏠 主页':'📄 对话')}
      ${t.running?' 🔄':''}
      ${i>0?`<span class="tab-close" onclick="event.stopPropagation();closeTab(${i})">✕</span>`:''}
    </button>`
  ).join('') + '<button class="tab-add" onclick="newTab()">+</button>';
}

function switchTab(i) {
  activeTab = i; renderTabs(); renderTabContent();
}

function newTab() {
  tabs.push({id:nextTabId++, topic:'', running:false, progressHTML:'', reportHTML:'', timerStart:0, timer:null, iteration:'-', evidence:'-', quality:'-'});
  activeTab = tabs.length-1; renderTabs(); renderTabContent();
}

function closeTab(i) {
  const t = tabs[i];
  if(t.timer) clearInterval(t.timer);
  tabs.splice(i,1);
  if(tabs.length===0){ tabs.push({id:nextTabId++, topic:'', running:false, progressHTML:'', reportHTML:''}); }
  if(activeTab>=tabs.length) activeTab=tabs.length-1;
  renderTabs(); renderTabContent();
}

function renderTabContent() {
  const container = $('tabContents');
  // 只渲染不存在或需要更新的标签页
  tabs.forEach((t, i) => {
    const existing = document.getElementById(`tab-${i}`);
    const isActive = i === activeTab;
    if (!existing || (isActive && t.running)) {
      // 重新渲染这个标签
      const div = existing || document.createElement('div');
      div.className = `tab-content ${isActive ? 'active' : ''}`;
      div.id = `tab-${i}`;
      div.innerHTML = `
        <div class="input-area">
          <input id="topicInput-${i}" placeholder="输入调研主题，例如：2026年中国新能源汽车市场竞争格局" value="${escHtml(t.topic)}" ${t.running?'disabled':''} />
          <select id="maxIter-${i}" ${t.running?'disabled':''}>
            <option value="1">1轮</option><option value="2">2轮</option><option value="3" selected>3轮</option><option value="4">4轮</option><option value="5">5轮</option>
          </select>
          <button id="submitBtn-${i}" onclick="startResearch(${i})" ${t.running?'disabled':''}>${t.running?'🔄 研搜中…':'🔍 开始调研'}</button>
        </div>
        <div class="status-bar">
          <span><span class="status-dot ${t.running?'running':'done'}"></span>${t.running?'研搜中':'待命'}</span>
          <span>⏱️ <b id="timer-${i}">${t.timerStart?timerDisplay(t):'00:00'}</b></span>
          <span>📊 轮次: <b id="iter-${i}">${t.iteration}</b></span>
          <span>📄 证据: <b id="evid-${i}">${t.evidence}</b></span>
          <span>⭐ 质量: <b id="qual-${i}">${t.quality}</b></span>
        </div>
        <div class="progress-panel" id="prog-${i}"><h3>📡 实时执行轨迹</h3>${t.progressHTML||'<div style="color:#484f58;font-size:12px;padding:8px">等待执行…</div>'}</div>
        <div id="report-${i}">${t.reportHTML || (i===0 ? `<div class="empty-state">
          <p><b>输入调研主题，开始自动化深度调研</b></p>
          <div class="example-bar">
            <button class="example-btn" onclick="setTopic(${i},'2026年中国新能源汽车市场竞争格局')">新能源汽车</button>
            <button class="example-btn" onclick="setTopic(${i},'AI芯片市场2026 NVIDIA AMD Intel')">AI芯片</button>
            <button class="example-btn" onclick="setTopic(${i},'光伏产业技术路线TOPCon vs HJT')">光伏产业</button>
            <button class="example-btn" onclick="setTopic(${i},'半导体供应链')">半导体</button>
            <button class="example-btn" onclick="setTopic(${i},'氢能产业链投资机会2026')">氢能</button>
          </div>
        </div>` : '')}</div>
      `;
      if (!existing) container.appendChild(div);
      // 绑定回车事件
      const inp = document.getElementById(`topicInput-${i}`);
      if (inp) inp.onkeydown = e => { if (e.key === 'Enter') startResearch(i); };
    }
    // 切换可见性
    const el = document.getElementById(`tab-${i}`);
    if (el) el.className = `tab-content ${isActive ? 'active' : ''}`;
  });
}

function timerDisplay(t) {
  if(!t.timerStart) return '00:00';
  const e = Math.floor((Date.now()-t.timerStart)/1000);
  return `${String(Math.floor(e/60)).padStart(2,'0')}:${String(e%60).padStart(2,'0')}`;
}

function setTopic(i, topic) {
  tabs[i].topic = topic;
  const el = document.getElementById('topicInput-'+i);
  if(el) el.value = topic;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function setEl(id, val) { const el = document.getElementById(id); if(el) el.textContent = val; }

// ═══ 调研 ═══
async function startResearch(i) {
  const t = tabs[i];
  const topicEl = document.getElementById(`topicInput-${i}`);
  if(!topicEl) return;
  const topic = topicEl.value.trim();
  if(!topic) return alert('请输入调研主题');
  const maxIter = document.getElementById(`maxIter-${i}`)?.value || '3';

  t.topic = topic; t.running = true; t.progressHTML = ''; t.reportHTML = '';
  t.iteration = '-'; t.evidence = '-'; t.quality = '-';
  t.timerStart = Date.now();
  if(t.timer) clearInterval(t.timer);
  t.timer = setInterval(() => { if(t.running) renderTabContent(); }, 1000);
  renderTabs(); renderTabContent();

  const progressDiv = document.getElementById(`prog-${i}`);
  function addProgressHTML(node, status, extra) {
    const icons = {planner:'🧠',search:'🔍',critic:'🔬',synthesizer:'📝'};
    const names = {planner:'任务规划',search:'信息检索',critic:'质量审核',synthesizer:'报告生成'};
    const runningText = {planner:'拆解问题中…',search:'并发搜索中…',critic:'评估证据中…',synthesizer:'撰写报告中…'};
    const doneText = {planner:'规划完成',search:'检索完成',critic:'审核完成',synthesizer:'报告生成'};
    let detail = '';
    if(extra && status==='success'){
      const p=[]; if(extra.plan_count) p.push(`拆解${extra.plan_count}子问题`);
      if(extra.query_count) p.push(`${extra.query_count}条搜索`);
      if(extra.total_count!=null) p.push(`证据池${extra.total_count}条`);
      if(extra.quality_score!=null) p.push(`质量${Number(extra.quality_score).toFixed(2)}`);
      if(extra.report_ready!=null) p.push(extra.report_ready?'✅证据充分':'🔄需补充');
      if(extra.iteration!=null) p.push(`第${extra.iteration}轮`);
      detail=p.join(' · ');
    }
    const icon = icons[node]||'📌', name = names[node]||node;
    if(status==='running'){
      t.progressHTML += `<div class="progress-item"><span class="progress-node">${icon} ${name}</span><span class="progress-status">⏳ ${runningText[node]||'执行中…'}</span></div>`;
    } else {
      const lines = t.progressHTML.split('\n');
      const lastIdx = lines.findLastIndex(l=>l.includes(name));
      const newLine = `<div class="progress-item"><span class="progress-node">${icon} ${name}</span><span class="progress-status success">✅ ${doneText[node]||'完成'}</span>${detail?`<span class="progress-detail">${detail}</span>`:''}</div>`;
      if(lastIdx>=0) lines[lastIdx] = newLine; else t.progressHTML += newLine;
    }
    // 直接更新 DOM（不重渲染整个标签页）
    const pd = document.getElementById(`prog-${i}`);
    if(pd) pd.innerHTML = `<h3>📡 实时执行轨迹</h3>${t.progressHTML}`;
    if(pd) pd.scrollTop = pd.scrollHeight;
  }

  try {
    const resp = await fetch(`${API}/api/research/stream?topic=${encodeURIComponent(topic)}&max_iterations=${maxIter}`, {
      headers: {'X-User-ID': USER_ID}
    });
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while(true) {
      const {done, value} = await reader.read();
      if(done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n'); buffer = lines.pop();
      for(const line of lines) {
        if(!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if(data === '[DONE]') { t.running = false; if(t.timer) clearInterval(t.timer); renderTabs(); renderTabContent(); continue; }
        try {
          const msg = JSON.parse(data);
          if(msg.type === 'progress') {
            if(msg.status === 'running') addProgressHTML(msg.node, 'running');
            else {
              addProgressHTML(msg.node, 'success', {plan_count:msg.plan_count,query_count:msg.query_count,total_count:msg.total_count,new_count:msg.new_count,quality_score:msg.quality_score,report_ready:msg.report_ready,iteration:msg.iteration});
              if(msg.node==='critic'){ t.iteration=msg.iteration!=null?msg.iteration:'-'; t.quality=msg.quality_score!=null?Number(msg.quality_score).toFixed(2):'-'; }
              if(msg.node==='search'){ t.evidence=msg.total_count!=null?msg.total_count:'-'; }
            }
          } else if(msg.type === 'report') {
            t.reportHTML = renderMarkdown(msg.data||'');
            t.running = false; if(t.timer) clearInterval(t.timer);
            renderTabs(); renderTabContent();
            setTimeout(loadHistory, 500);
          } else if(msg.type === 'error') {
            t.progressHTML += `<div class="progress-item"><span class="progress-node">❌ 错误</span><span class="progress-status error">${escHtml(msg.message||'未知')}</span></div>`;
            t.running = false; if(t.timer) clearInterval(t.timer);
          }
        } catch(e) {}
      }
    }
  } catch(e) {
    t.progressHTML += `<div class="progress-item"><span class="progress-node">❌ 连接失败</span><span class="progress-status error">${escHtml(e.message)}</span></div>`;
    t.running = false; if(t.timer) clearInterval(t.timer);
  }
  renderTabs(); renderTabContent();
}

// ═══ 历史 ═══
async function loadHistory() {
  const list = $('sidebarList');
  list.innerHTML = '<div class="sidebar-empty">加载中…</div>';
  if(!USER_ID) return;
  try {
    const resp = await fetch(`${API}/api/history?limit=50`, {headers:{'X-User-ID':USER_ID}});
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const reports = await resp.json();
    if(!reports.length){ list.innerHTML='<div class="sidebar-empty">暂无对话</div>'; return; }
    list.innerHTML = reports.map(r => `
      <div class="sidebar-item" onclick="viewReport('${r.session_id}')" data-sid="${r.session_id}">
        <div class="si-topic">${escHtml(r.topic)}</div>
        <div class="si-meta"><span>⭐<b>${(r.fact_quality_score||0).toFixed(2)}</b></span><span>📄<b>${r.evidence_count||0}</b></span><span>🔄<b>${r.iteration_count||0}轮</b></span></div>
        <div class="si-meta">${(r.created_at||'').slice(0,16)}</div>
      </div>`).join('');
  } catch(e) { list.innerHTML = `<div class="sidebar-empty">加载失败</div>`; }
}

async function viewReport(sid) {
  try {
    newTab(); const i = activeTab; tabs[i].reportHTML = '<p style="color:#8b949e">加载中…</p>'; renderTabContent();
    const r = await (await fetch(`${API}/api/report/${sid}`,{headers:{'X-User-ID':USER_ID}})).json();
    tabs[i].reportHTML = renderMarkdown(r.final_report||'');
    tabs[i].topic = r.topic; tabs[i].iteration = r.iteration_count||'-';
    tabs[i].evidence = r.evidence_count||'-'; tabs[i].quality = (r.fact_quality_score||0).toFixed(2);
    renderTabs(); renderTabContent();
  } catch(e) { tabs[activeTab].reportHTML = `<p style="color:#f85149">加载失败</p>`; renderTabContent(); }
}

function renderMarkdown(md) {
  if(!md) return '<p style="color:#484f58">报告内容为空</p>';
  let h = md.replace(/### (.+)/g,'<h3>$1</h3>').replace(/## (.+)/g,'<h2>$1</h2>').replace(/# (.+)/g,'<h1>$1</h1>');
  h = h.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/`([^`]+)`/g,'<code>$1</code>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
  h = h.replace(/^- (.+)/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');
  h = h.replace(/\n\n/g,'</p><p>').replace(/^(?!<)/gm,'<p>').replace(/^(?!<)/gm,'</p>');
  h = h.replace(/<p>\s*<p>/g,'<p>').replace(/<p><([huo])/g,'<$1').replace(/(<\/([huo][^>]*)>)\s*<\/p>/g,'$1');
  return `<div class="report-panel">${h}</div>`;
}

renderTabContent();
</script>
